<!-- 
  FILE 1: index.html
  Main structure with horizontal mode tabs
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="author" content="BTATA">
  <title>BTATA AIM | Elite Precision Trainer</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <!-- Premium Header -->
    <header class="header">
      <div class="logo-container">
        <div class="logo-mark">◉</div>
        <div class="logo-text">
          <span class="logo-main">BTATA AIM</span>
          <span class="logo-badge">ELITE</span>
        </div>
      </div>
      <div class="header-stats">
        <div class="header-stat">
          <span class="header-stat-label">SCORE</span>
          <span class="header-stat-value" id="headerScore">0</span>
        </div>
        <div class="header-stat">
          <span class="header-stat-label">ACCURACY</span>
          <span class="header-stat-value" id="headerAccuracy">0%</span>
        </div>
        <div class="header-stat">
          <span class="header-stat-label">HIGH</span>
          <span class="header-stat-value" id="headerHigh">0</span>
        </div>
      </div>
      <div class="creator-mark">
        <span>CREATED BY</span>
        <strong>BTATA</strong>
      </div>
    </header>

    <!-- Main Game Area -->
    <main class="main-content">
      <!-- Canvas Arena -->
      <div class="arena">
        <canvas id="aimCanvas"></canvas>
        <div class="arena-glow"></div>
      </div>

      <!-- Right Sidebar -->
      <aside class="sidebar">
        <!-- LIVE STATS CARD -->
        <div class="card stats-card">
          <div class="card-header">
            <span class="card-icon">📊</span>
            <h3 class="card-title">SESSION METRICS</h3>
          </div>
          <div class="stats-grid">
            <div class="stat-item">
              <span class="stat-number" id="statScore">0</span>
              <span class="stat-name">SCORE</span>
            </div>
            <div class="stat-item">
              <span class="stat-number" id="statHits">0</span>
              <span class="stat-name">HITS</span>
            </div>
            <div class="stat-item">
              <span class="stat-number" id="statShots">0</span>
              <span class="stat-name">SHOTS</span>
            </div>
            <div class="stat-item">
              <span class="stat-number" id="statAccuracy">0%</span>
              <span class="stat-name">ACCURACY</span>
            </div>
          </div>
          <div class="streak-indicator" id="streakIndicator">
            <span>🔥 STREAK</span>
            <strong id="streakCount">0</strong>
          </div>
          <div class="feedback-message" id="feedbackMsg"></div>
        </div>

        <!-- DIFFICULTY CARD -->
        <div class="card difficulty-card">
          <div class="card-header">
            <span class="card-icon">⚡</span>
            <h3 class="card-title">DIFFICULTY</h3>
          </div>
          <div class="difficulty-selector">
            <button data-diff="beginner" class="diff-option">BEGINNER</button>
            <button data-diff="normal" class="diff-option active">NORMAL</button>
            <button data-diff="veteran" class="diff-option">VETERAN</button>
            <button data-diff="elite" class="diff-option">ELITE</button>
            <button data-diff="legend" class="diff-option">LEGEND</button>
          </div>
        </div>

        <!-- AIM SETTINGS CARD -->
        <div class="card settings-card">
          <div class="card-header">
            <span class="card-icon">🎯</span>
            <h3 class="card-title">AIM SETTINGS</h3>
          </div>
          <div class="settings-list">
            <div class="setting-row">
              <label>SENSITIVITY</label>
              <div class="slider-wrapper">
                <input type="range" id="sensitivitySlider" min="0.3" max="2.5" step="0.01" value="1.0">
                <span id="sensitivityVal">1.00</span>
              </div>
            </div>
            <div class="setting-row">
              <label>TARGET COLOR</label>
              <div class="color-preview-group">
                <div class="color-swatch" id="targetSwatch" style="background: #ff3366;"></div>
                <input type="color" id="targetColorPicker" value="#ff3366">
              </div>
            </div>
            <div class="setting-row">
              <label>CROSSHAIR</label>
              <div class="crosshair-group">
                <button data-cross="dot" class="cross-option active">●</button>
                <button data-cross="cross" class="cross-option">✛</button>
                <button data-cross="circle" class="cross-option">○</button>
                <button data-cross="plus" class="cross-option">+</button>
                <button data-cross="none" class="cross-option">⊘</button>
              </div>
            </div>
          </div>
        </div>

        <!-- AUDIO CARD -->
        <div class="card audio-card">
          <div class="card-header">
            <span class="card-icon">🔊</span>
            <h3 class="card-title">AUDIO</h3>
          </div>
          <div class="settings-list">
            <div class="setting-row">
              <label>SOFT GUNSHOT</label>
              <div class="toggle" id="soundToggle">
                <div class="toggle-knob"></div>
              </div>
            </div>
            <div class="setting-row">
              <label>VOLUME</label>
              <div class="slider-wrapper">
                <input type="range" id="volumeSlider" min="0" max="100" value="28">
                <span id="volumeVal">28%</span>
              </div>
            </div>
            <div class="setting-row">
              <label>HIT FLASH</label>
              <div class="toggle" id="flashToggle">
                <div class="toggle-knob"></div>
              </div>
            </div>
          </div>
        </div>

        <!-- ACTION BUTTONS -->
        <div class="card action-card">
          <button id="resetSessionBtn" class="action-btn secondary">⟳ NEW ROUND</button>
          <button id="resetAllBtn" class="action-btn danger">🗑️ RESET STATS</button>
        </div>
      </aside>
    </main>

    <!-- HORIZONTAL MODE TABS (LIKE FIRST IMAGE STYLE) -->
    <div class="mode-tabs-container">
      <div class="mode-tabs-scroll">
        <button data-mode="tracking" class="mode-tab active">
          <span class="tab-icon">🎯</span>
          <span class="tab-name">TRACKING</span>
        </button>
        <button data-mode="flick" class="mode-tab">
          <span class="tab-icon">⚡</span>
          <span class="tab-name">FLICK</span>
        </button>
        <button data-mode="reaction" class="mode-tab">
          <span class="tab-icon">🔫</span>
          <span class="tab-name">REACTION</span>
        </button>
        <button data-mode="precision" class="mode-tab">
          <span class="tab-icon">🎯</span>
          <span class="tab-name">PRECISION</span>
        </button>
        <button data-mode="speed" class="mode-tab">
          <span class="tab-icon">💨</span>
          <span class="tab-name">SPEED</span>
        </button>
        <button data-mode="moving" class="mode-tab">
          <span class="tab-icon">🔄</span>
          <span class="tab-name">MOVING</span>
        </button>
        <button data-mode="custom" class="mode-tab">
          <span class="tab-icon">⚙️</span>
          <span class="tab-name">CUSTOM</span>
        </button>
        <button data-mode="headshot" class="mode-tab">
          <span class="tab-icon">🎯</span>
          <span class="tab-name">HEADSHOT</span>
        </button>
        <button data-mode="survival" class="mode-tab">
          <span class="tab-icon">🛡️</span>
          <span class="tab-name">SURVIVAL</span>
        </button>
      </div>
      <div class="mode-tab-indicator"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
